name: Validate Catalog

on:
  pull_request:
    paths:
      - catalog.json
      - .github/workflows/validate-catalog.yml
  push:
    branches:
      - main
    paths:
      - catalog.json
      - .github/workflows/validate-catalog.yml

jobs:
  validate:
    name: Validate catalog.json
    if: ${{ vars.DRWN_VERSION != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: curation-labs/drwn-validate-action@v1
        with:
          mode: catalog
          path: catalog.json
          drwn-version: ${{ vars.DRWN_VERSION }}
